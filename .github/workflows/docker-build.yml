name: Build Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'all_in_one_server.py'
      - 'handlers.py'
      - 'tools.py'
      - 'quality_metrics.py'
      - 'start.sh'
      - 'Dockerfile'
      - 'constraints.txt'
      - 'requirements.txt'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/local/share/powershell /usr/local/share/chromium
          sudo rm -rf /usr/local/graalvm /usr/local/lib/node_modules
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/node
          sudo apt-get clean
          docker system prune -af
          echo "=== After cleanup ==="
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ailoveyou89/voicebot-pipeline:latest
            ghcr.io/ailoveyou89/voicebot-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
